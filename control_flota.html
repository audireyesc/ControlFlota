<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Flota</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg: #F4F3EF;
    --panel: #FFFFFF;
    --ink: #21251F;
    --ink-soft: #5B6058;
    --ink-faint: #8B9089;
    --line: #DEDCD3;
    --line-soft: #ECEAE3;
    --accent: #B5651D;
    --accent-soft: #F1E3D3;
    --accent-ink: #6B3A10;
    --maint: #5C5240;
    --maint-soft: #ECE7DD;
    --fuel: #1F5C53;
    --fuel-soft: #DCEAE6;
    --toll: #5A4A7A;
    --toll-soft: #E7E2EF;
    --radius: 14px;
    --radius-sm: 9px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);}
  .app{max-width:720px;margin:0 auto;padding:18px 16px 60px;}

  .masthead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .masthead-left{display:flex;align-items:center;gap:10px;}
  .masthead-icon{width:36px;height:36px;border-radius:10px;background:var(--ink);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;}
  .masthead h1{font-size:17px;font-weight:600;margin:0;letter-spacing:-0.01em;}
  .masthead p{font-size:12px;color:var(--ink-faint);margin:1px 0 0;}
  .icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}
  .icon-btn:active{transform:scale(0.96);}

  .role-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;}
  .role-badge.user{background:var(--accent-soft);color:var(--accent-ink);}
  .role-badge.accountant{background:var(--fuel-soft);color:var(--fuel);}
  .role-badge.boss{background:var(--toll-soft);color:var(--toll);}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .card-title{font-size:13px;font-weight:600;color:var(--ink-soft);margin:0 0 12px;display:flex;align-items:center;gap:6px;}

  .field{margin-bottom:11px;}
  .field label{display:block;font-size:11.5px;color:var(--ink-faint);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.03em;}
  .field select, .field input{width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 11px;font-size:15px;background:var(--bg);color:var(--ink);font-family:inherit;}
  .field select:focus, .field input:focus{outline:none;border-color:var(--accent);background:var(--panel);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .amount-wrap{position:relative;}
  .amount-wrap span{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:15px;}
  .amount-wrap input{padding-left:24px;font-variant-numeric:tabular-nums;}
  .field-empty{border-color:#C44545 !important;}

  .cat-toggle{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
  .cat-btn{border:1.5px solid var(--line);background:var(--panel);border-radius:var(--radius-sm);padding:9px 4px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:4px;}
  .cat-btn i{font-size:18px;}
  .cat-btn.active.maint{border-color:var(--maint);background:var(--maint-soft);color:var(--maint);}
  .cat-btn.active.fuel{border-color:var(--fuel);background:var(--fuel-soft);color:var(--fuel);}
  .cat-btn.active.toll{border-color:var(--toll);background:var(--toll-soft);color:var(--toll);}

  .submit-btn{width:100%;border:none;border-radius:var(--radius-sm);padding:13px;font-size:14.5px;font-weight:600;background:var(--ink);color:var(--bg);cursor:pointer;margin-top:4px;}
  .submit-btn:active{transform:scale(0.98);}

  .totals-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
  .total-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;}
  .total-card .lbl{font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;}
  .total-card .val{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;}
  .total-card.maint .val{color:var(--maint);}
  .total-card.fuel .val{color:var(--fuel);}
  .total-card.toll .val{color:var(--toll);}
  .total-card.grand{background:var(--ink);border-color:var(--ink);}
  .total-card.grand .lbl{color:#C8CCC2;}
  .total-card.grand .val{color:var(--bg);font-size:18px;}

  .tabs{display:flex;gap:4px;background:var(--line-soft);padding:3px;border-radius:11px;margin-bottom:12px;}
  .tab{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--ink-faint);cursor:pointer;}
  .tab.active{background:var(--panel);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,0.06);}

  .entry{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line-soft);}
  .entry:last-child{border-bottom:none;}
  .entry-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
  .entry-avatar.maint{background:var(--maint-soft);color:var(--maint);}
  .entry-avatar.fuel{background:var(--fuel-soft);color:var(--fuel);}
  .entry-avatar.toll{background:var(--toll-soft);color:var(--toll);}
  .entry-mid{flex:1;min-width:0;}
  .entry-plate{font-size:13.5px;font-weight:600;font-family:"SF Mono",ui-monospace,monospace;letter-spacing:0.02em;}
  .entry-sub{font-size:12px;color:var(--ink-faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-notes{font-size:11.5px;color:var(--ink-soft);margin-top:3px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-right{text-align:right;flex-shrink:0;}
  .entry-amt{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;}
  .entry-date{font-size:11px;color:var(--ink-faint);margin-top:1px;}
  .entry-del{width:26px;height:26px;border:none;background:none;color:var(--ink-faint);cursor:pointer;font-size:15px;flex-shrink:0;}

  .placeholder{text-align:center;padding:36px 16px;color:var(--ink-faint);}
  .placeholder i{font-size:26px;margin-bottom:8px;display:block;}
  .placeholder p{font-size:13px;margin:0;}

  .section-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .section-toolbar h2{font-size:13px;font-weight:600;color:var(--ink-soft);margin:0;}
  .export-link{font-size:12px;color:var(--accent-ink);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(33,37,31,0.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .modal-backdrop.open{display:flex;}
  .modal{background:var(--panel);width:100%;max-width:720px;border-radius:18px 18px 0 0;padding:18px 18px 28px;max-height:82vh;overflow-y:auto;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .modal-head h3{font-size:15px;font-weight:600;margin:0;}
  .modal-close{width:30px;height:30px;border:none;background:var(--line-soft);border-radius:50%;color:var(--ink-soft);cursor:pointer;}

  .list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line-soft);font-size:14px;}
  .list-item:last-child{border-bottom:none;}
  .list-item button{border:none;background:none;color:#C44545;font-size:14px;cursor:pointer;}
  .add-row{display:flex;gap:8px;margin-top:12px;}
  .add-row input{flex:1;border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 10px;font-size:14px;background:var(--bg);}
  .add-row button{border:none;background:var(--ink);color:var(--bg);border-radius:var(--radius-sm);padding:0 14px;font-size:13px;font-weight:500;cursor:pointer;}

  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:99px;font-size:13px;opacity:0;pointer-events:none;transition:opacity 0.2s, transform 0.2s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

  .gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:20px;}
  .gate-icon{width:56px;height:56px;border-radius:16px;background:var(--ink);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:16px;}
  .gate h1{font-size:19px;font-weight:600;margin:0 0 4px;}
  .gate p{font-size:13px;color:var(--ink-faint);margin:0 0 28px;}
  .role-options{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;}
  .role-option{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);cursor:pointer;text-align:left;}
  .role-option:active{transform:scale(0.98);}
  .role-option .ro-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .role-option.user .ro-icon{background:var(--accent-soft);color:var(--accent-ink);}
  .role-option.accountant .ro-icon{background:var(--fuel-soft);color:var(--fuel);}
  .role-option.boss .ro-icon{background:var(--toll-soft);color:var(--toll);}
  .role-option .ro-text strong{display:block;font-size:14px;font-weight:600;}
  .role-option .ro-text span{display:block;font-size:12px;color:var(--ink-faint);margin-top:1px;}

  .pin-box{width:100%;max-width:280px;}
  .pin-box input{width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;font-size:22px;text-align:center;letter-spacing:0.4em;background:var(--panel);}
  .pin-box input:focus{outline:none;border-color:var(--accent);}
  .pin-error{font-size:12.5px;color:#C44545;margin-top:10px;min-height:16px;}
  .gate-back{margin-top:18px;font-size:12.5px;color:var(--ink-faint);background:none;border:none;cursor:pointer;}

  .change-pin-row{display:flex;gap:8px;align-items:center;margin-top:6px;}
  .change-pin-row input{flex:1;border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 10px;font-size:14px;background:var(--bg);}
  .change-pin-row button{border:none;background:var(--ink);color:var(--bg);border-radius:var(--radius-sm);padding:0 12px;font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;}

  .summary-row{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line-soft);}
  .summary-row:last-child{border-bottom:none;}
  .summary-row .sr-label{font-size:13.5px;font-weight:500;}
  .summary-row .sr-sub{font-size:11.5px;color:var(--ink-faint);margin-top:2px;}
  .summary-row .sr-val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
  .bar-track{height:6px;background:var(--line-soft);border-radius:99px;margin-top:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;}

  .perf-card{border:0.5px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px;background:var(--bg);}
  .perf-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .perf-plate{font-size:14px;font-weight:600;font-family:"SF Mono",ui-monospace,monospace;letter-spacing:0.02em;}
  .perf-rank{font-size:10.5px;color:var(--ink-faint);font-weight:500;margin-right:6px;}
  .perf-total{font-size:14.5px;font-weight:600;}
  .split-track{height:10px;border-radius:99px;overflow:hidden;display:flex;margin-top:8px;background:var(--line-soft);}
  .split-seg-op{height:100%;background:var(--fuel);}
  .split-seg-maint{height:100%;background:var(--maint);}
  .perf-legend{display:flex;justify-content:space-between;margin-top:6px;font-size:11.5px;color:var(--ink-faint);}
  .perf-legend .lg-item{display:flex;align-items:center;gap:5px;}
  .lg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .lg-dot.op{background:var(--fuel);}
  .lg-dot.maint{background:var(--maint);}
  .perf-pct{font-weight:600;}

  /* Boss view: wide responsive layout */
  .boss-app{max-width:1180px;margin:0 auto;padding:18px 16px 60px;}
  .boss-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  .boss-top-row{display:grid;grid-template-columns:1fr;gap:14px;}
  .boss-mid-row{display:grid;grid-template-columns:1fr;gap:14px;}
  @media (min-width: 760px){
    .boss-top-row{grid-template-columns:220px 1fr 1fr;}
    .boss-mid-row{grid-template-columns:1fr 1fr;}
  }
  .grand-card{background:var(--ink);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;}
  .grand-card .lbl{font-size:11px;color:#C8CCC2;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;}
  .grand-card .val{font-size:26px;font-weight:600;color:var(--bg);font-variant-numeric:tabular-nums;line-height:1.1;}
  .grand-card .sub{font-size:11.5px;color:#9CA194;margin-top:8px;}
  .chart-wrap{position:relative;height:200px;}
  .chart-wrap.tall{height:260px;}
  .donut-legend{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
  .donut-legend-item{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;}
  .donut-legend-left{display:flex;align-items:center;gap:7px;color:var(--ink-soft);}
  .donut-legend-val{font-weight:600;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>

<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  var ICON_PATHS = {
    'steering-wheel': '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/><path d="M12 5v4.5M7.5 14.5L4.5 17M16.5 14.5l3 2.5M12 14.5V19"/>',
    'square-rounded-plus': '<path d="M12 8v8M8 12h8"/><rect x="3.5" y="3.5" width="17" height="17" rx="4"/>',
    'clipboard-list': '<rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4a3 3 0 0 1 6 0"/><path d="M9 11h6M9 14h6M9 8h2"/>',
    'chart-bar': '<path d="M5 19V10M11 19V5M17 19v-7"/><path d="M4 19h16"/>',
    'tool': '<path d="M14.5 5.5a3.5 3.5 0 0 1-4.7 4.7L5 15l2 2 4.8-4.8a3.5 3.5 0 0 1 4.7-4.7l-2.5 2.5-1.5-1.5 2-2z"/>',
    'gas-station': '<path d="M4 21V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v15"/><path d="M3 21h12M14 9h1.5l2.5 2.5v5.5a1.5 1.5 0 0 0 3 0V10l-3-3"/><path d="M6 6h6"/>',
    'road': '<path d="M9 4 5 20M15 4l4 16M11 5l-.7 3M10 11l-.7 3M9 17l-.5 2.5"/>',
    'settings': '<circle cx="12" cy="12" r="2.5"/><path d="M12 4v1.5M12 18.5V20M4 12h1.5M18.5 12H20M6.3 6.3l1 1M16.7 16.7l1 1M6.3 17.7l1-1M16.7 7.3l1-1"/>',
    'download': '<path d="M12 4v11M8 11l4 4 4-4M5 19h14"/>',
    'logout': '<path d="M14 7V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-2"/><path d="M9 12h11M17 8l3 4-3 4"/>',
    'x': '<path d="M6 6l12 12M18 6L6 18"/>',
    'license': '<rect x="3.5" y="6" width="17" height="12" rx="2"/><circle cx="8.5" cy="12" r="2"/><path d="M13 10h5M13 14h3"/>',
    'users': '<circle cx="9" cy="8" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><circle cx="17" cy="9" r="2.5"/><path d="M15.5 13.5a4.5 4.5 0 0 1 5 4.5"/>',
    'key': '<circle cx="8" cy="15" r="3.5"/><path d="M10.5 12.5 18 5M15 8l2 2M18 5l2 2"/>',
    'database': '<ellipse cx="12" cy="6" rx="7" ry="2.5"/><path d="M5 6v6c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5V6"/><path d="M5 12v6c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5v-6"/>',
    'trash': '<path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m3 0-1 13a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 7h14Z"/><path d="M10 11v6M14 11v6"/>',
    'chart-pie': '<path d="M12 3.5a8.5 8.5 0 1 0 8.5 8.5H12V3.5Z"/><path d="M15.5 3.8A8.5 8.5 0 0 1 20.2 8.5H15.5V3.8Z"/>',
    'car': '<path d="M4.5 16V11.5L6.5 7h11l2 4.5V16"/><path d="M4 16h16v2.5a1 1 0 0 1-1 1h-1a1 1 0 0 1-1-1V18H7v.5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V16Z"/><circle cx="7.5" cy="16" r="1.3"/><circle cx="16.5" cy="16" r="1.3"/>',
    'gauge': '<circle cx="12" cy="13" r="8"/><path d="M12 13l3.5-3.5M12 6.5v1.5M5.5 13H7M17 13h1.5"/>'
  };

  function icon(name, extraStyle){
    var path = ICON_PATHS[name] || '';
    var style = 'display:inline-block;vertical-align:-0.15em;flex-shrink:0;' + (extraStyle || '');
    return '<svg style="' + style + '" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + path + '</svg>';
  }

  var STATE = { plates: [], people: [], entries: [], pins: { accountant: '1234', boss: '5678' } };
  var SESSION = { role: null };
  var FORM = { category: 'maint' };
  var TAB = { detail: 'maint' };

  var CAT_LABEL = { maint: 'Mantenimiento', fuel: 'Combustible', toll: 'Peaje' };
  var CAT_ICON = { maint: 'tool', fuel: 'gas-station', toll: 'road' };
  var CAT_COLOR = { maint: 'var(--maint)', fuel: 'var(--fuel)', toll: 'var(--toll)' };

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function money(n){ return '$' + Number(n).toLocaleString('es-EC', {minimumFractionDigits:2, maximumFractionDigits:2}); }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function fmtDate(iso){ var p = iso.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
  function initials(name){
    var parts = name.trim().split(/\s+/);
    return ((parts[0]||'')[0] + (parts[1]||'')[0]).toUpperCase();
  }
  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 1800);
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  var API_URL = 'https://script.google.com/macros/s/AKfycbw6mwYPJ0SnVMc8n3LSs6aAGlkHcKiVPyI3wh7U8OHJPAcNh5oW8OWAKSGLNfmocTpUzQ/exec';

  function normalizeEntries(rawEntries){
    return (rawEntries || []).map(function(r){
      return {
        id: String(r.id),
        category: r.categoria,
        plate: r.placa,
        person: r.persona,
        amount: Number(r.monto),
        date: r.fecha instanceof Date ? r.fecha.toISOString().slice(0,10) : String(r.fecha).slice(0,10),
        created: r.creado ? Number(r.creado) : 0,
        notes: r.observaciones || ''
      };
    });
  }

  async function apiPost(payload){
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  async function loadAll(){
    try{
      var res = await fetch(API_URL + '?action=all');
      var data = await res.json();
      STATE.entries = normalizeEntries(data.entries);
      STATE.plates = data.plates || [];
      STATE.people = data.people || [];
      STATE.pins = data.pins || { accountant: '1234', boss: '5678' };
    }catch(e){
      showToast('Sin conexión con la base de datos');
      STATE.plates = []; STATE.people = []; STATE.entries = [];
    }
  }

  function bindGate(){
    document.querySelectorAll('.role-option').forEach(function(btn){
      btn.addEventListener('click', function(){
        var role = btn.getAttribute('data-role');
        if(role === 'user'){
          SESSION.role = 'user';
          render();
        } else {
          document.getElementById('root').innerHTML = pinPromptHTML(role);
          var input = document.getElementById('pin-input');
          input.focus();
          document.getElementById('pin-back').addEventListener('click', function(){ render(); });
          function tryPin(){
            var val = input.value;
            if(val === STATE.pins[role]){
              SESSION.role = role;
              render();
            } else {
              document.getElementById('pin-error').textContent = 'PIN incorrecto';
              input.value = '';
            }
          }
          input.addEventListener('keydown', function(e){ if(e.key === 'Enter') tryPin(); });
          input.addEventListener('input', function(){
            if(input.value.length >= 4) tryPin();
          });
        }
      });
    });
  }

  function bindUserView(){
    document.getElementById('logout-btn').addEventListener('click', function(){ SESSION.role = null; render(); });

    document.querySelectorAll('.cat-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        FORM.category = btn.getAttribute('data-cat');
      });
    });

    document.getElementById('submit-btn').addEventListener('click', async function(){
      var plateSel = document.getElementById('f-plate');
      var personSel = document.getElementById('f-person');
      var amountInput = document.getElementById('f-amount');
      var amount = parseFloat(amountInput.value);
      var notesInput = document.getElementById('f-notes');
      var notes = notesInput.value.trim();
      var btn = document.getElementById('submit-btn');

      var valid = true;
      [plateSel, personSel].forEach(function(el){
        el.classList.remove('field-empty');
        if(!el.value){ el.classList.add('field-empty'); valid = false; }
      });
      amountInput.classList.remove('field-empty');
      if(!amount || amount <= 0){ amountInput.classList.add('field-empty'); valid = false; }
      notesInput.classList.remove('field-empty');
      if(!notes){ notesInput.classList.add('field-empty'); valid = false; }

      if(!valid){ showToast('Completa placa, persona, monto y observaciones'); return; }

      var newEntry = {
        id: uid(),
        category: FORM.category,
        plate: plateSel.value,
        person: personSel.value,
        amount: amount,
        date: todayISO(),
        created: Date.now(),
        notes: notes
      };

      btn.disabled = true;
      btn.textContent = 'Guardando…';
      try{
        await apiPost({ action: 'addEntry', id: newEntry.id, category: newEntry.category, plate: newEntry.plate, person: newEntry.person, amount: newEntry.amount, date: newEntry.date, created: newEntry.created, notes: newEntry.notes });
        STATE.entries.push(newEntry);
        amountInput.value = '';
        notesInput.value = '';
        showToast(CAT_LABEL[FORM.category] + ' guardado');
      }catch(err){
        showToast('No se pudo guardar, revisa tu conexión');
      }
      btn.disabled = false;
      btn.textContent = 'Guardar registro';
    });
  }

        }
      });

    document.getElementById('export-btn').addEventListener('click', function(){
      if(STATE.entries.length === 0){ showToast('No hay registros para exportar'); return; }
      var rows = [['Categoria','Placa','Persona','Monto','Fecha']];
      STATE.entries.slice().sort(function(a,b){ return a.date.localeCompare(b.date); }).forEach(function(e){
        rows.push([CAT_LABEL[e.category], e.plate, e.person, e.amount, e.date]);
      });
      var csv = rows.map(function(r){
        return r.map(function(cell){
          var s = String(cell);
          return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
        }).join(',');
      }).join('\n');
      var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'control_flota_' + todayISO() + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('CSV descargado');
    });

  function topPlateLabel(){
    var byPlate = {};
    STATE.entries.forEach(function(e){ byPlate[e.plate] = (byPlate[e.plate] || 0) + Number(e.amount); });
    var keys = Object.keys(byPlate);
    if(keys.length === 0) return 'Sin datos todavía';
    keys.sort(function(a,b){ return byPlate[b] - byPlate[a]; });
    return keys[0] + ' es el de mayor gasto';
  }

  function vehiclePerformanceHTML(){
    var plates = STATE.plates.slice();
    STATE.entries.forEach(function(e){ if(plates.indexOf(e.plate) === -1) plates.push(e.plate); });

    var data = plates.map(function(p){
      var op = STATE.entries.filter(function(e){ return e.plate === p && (e.category === 'fuel' || e.category === 'toll'); })
        .reduce(function(a,e){ return a + Number(e.amount); }, 0);
      var maint = STATE.entries.filter(function(e){ return e.plate === p && e.category === 'maint'; })
        .reduce(function(a,e){ return a + Number(e.amount); }, 0);
      return { plate: p, op: op, maint: maint, total: op + maint };
    }).filter(function(d){ return d.total > 0; });

    if(data.length === 0){
      return '<div class="placeholder" style="grid-column:1 / -1;">' + icon('gauge') + '<p>Sin datos todavía</p></div>';
    }

    data.sort(function(a,b){ return b.total - a.total; });

    return data.map(function(d, i){
      var opPct = d.total > 0 ? (d.op / d.total * 100) : 0;
      var maintPct = d.total > 0 ? (d.maint / d.total * 100) : 0;
      return '<div class="perf-card">' +
        '<div class="perf-head">' +
          '<span><span class="perf-rank">#' + (i+1) + '</span><span class="perf-plate">' + esc(d.plate) + '</span></span>' +
          '<span class="perf-total">' + money(d.total) + '</span>' +
        '</div>' +
        '<div class="split-track">' +
          '<div class="split-seg-op" style="width:' + opPct.toFixed(1) + '%;"></div>' +
          '<div class="split-seg-maint" style="width:' + maintPct.toFixed(1) + '%;"></div>' +
        '</div>' +
        '<div class="perf-legend">' +
          '<span class="lg-item"><span class="lg-dot op"></span>Operativo <span class="perf-pct">' + Math.round(opPct) + '%</span> · ' + money(d.op) + '</span>' +
          '<span class="lg-item"><span class="lg-dot maint"></span>Mantenim. <span class="perf-pct">' + Math.round(maintPct) + '%</span> · ' + money(d.maint) + '</span>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  }

  function renderBossCharts(){
    destroyBossCharts();
    if(typeof Chart === 'undefined') return;

    var gt = grandTotal();
    var cats = ['maint','fuel','toll'];
    var catColors = { maint: '#5C5240', fuel: '#1F5C53', toll: '#5A4A7A' };
    var catVals = cats.map(function(c){ return catTotal(c); });

    var donutCanvas = document.getElementById('cat-donut');
    if(donutCanvas && gt > 0){
      bossCharts.donut = new Chart(donutCanvas, {
        type: 'doughnut',
        data: {
          labels: cats.map(function(c){ return CAT_LABEL[c]; }),
          datasets: [{ data: catVals, backgroundColor: cats.map(function(c){ return catColors[c]; }), borderWidth: 0 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '68%',
          plugins: { legend: { display: false }, tooltip: {
            callbacks: { label: function(ctx){ return ctx.label + ': ' + money(ctx.parsed); } }
          } }
        }
      });
    }

    var legend = document.getElementById('cat-legend');
    if(legend){
      legend.innerHTML = cats.map(function(c){
        var t = catTotal(c);
        var pct = gt > 0 ? Math.round(t/gt*100) : 0;
        return '<div class="donut-legend-item">' +
          '<span class="donut-legend-left"><span class="lg-dot" style="background:' + catColors[c] + ';"></span>' + CAT_LABEL[c] + ' · ' + pct + '%</span>' +
          '<span class="donut-legend-val">' + money(t) + '</span>' +
        '</div>';
      }).join('');
    }

    var byPlate = {};
    STATE.entries.forEach(function(e){ byPlate[e.plate] = (byPlate[e.plate] || 0) + Number(e.amount); });
    var plateKeys = Object.keys(byPlate).sort(function(a,b){ return byPlate[b] - byPlate[a]; }).slice(0,8);

    var barsCanvas = document.getElementById('plate-bars');
    if(barsCanvas && plateKeys.length > 0){
      bossCharts.bars = new Chart(barsCanvas, {
        type: 'bar',
        data: {
          labels: plateKeys,
          datasets: [{ data: plateKeys.map(function(p){ return byPlate[p]; }), backgroundColor: '#B5651D', borderRadius: 4, maxBarThickness: 28 }]
        },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: {
            callbacks: { label: function(ctx){ return money(ctx.parsed.x); } }
          } },
          scales: {
            x: { ticks: { callback: function(v){ return '$' + v; }, font: { size: 11 } }, grid: { color: '#ECEAE3' } },
            y: { ticks: { font: { size: 12, family: 'ui-monospace, monospace' } }, grid: { display: false } }
          }
        }
      });
    }
  }

  function bindBossView(){
    document.getElementById('logout-btn').addEventListener('click', function(){ SESSION.role = null; render(); });
    renderBossCharts();
  }

  async function init(){
    await loadAll();
    render();
  }
  init();
})();
</script>
</body>
</html>
